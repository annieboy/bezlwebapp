<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0c0d12">
  <title>BEZL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    /* ── Base ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; width: 100%; overflow: hidden;
      font-family: "Inter", -apple-system, system-ui, sans-serif;
      background: #ecedf0; color: #0c0d12;
      -webkit-font-smoothing: antialiased;
      -webkit-text-size-adjust: 100%;
    }
    button { font-family: inherit; cursor: pointer; border: none; background: none; padding: 0; }
    img { display: block; }
    .display { font-family: "Space Grotesk", "Inter", system-ui, sans-serif; }
    .mono    { font-family: "JetBrains Mono", ui-monospace, monospace; }

    /* ── Screen system ────────────────────────────────────── */
    .screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      opacity: 0; pointer-events: none;
      transition: opacity 0.28s ease;
      overflow: hidden;
    }
    .screen.active { opacity: 1; pointer-events: auto; }

    /* ── Loading ──────────────────────────────────────────── */
    #s-loading {
      align-items: center; justify-content: center; gap: 20px;
      background: #0c0d12;
    }
    .bezl-logo {
      font-family: "Space Grotesk", sans-serif;
      font-size: 28px; font-weight: 700; letter-spacing: 0.12em; color: #fff;
    }
    .bezl-logo em { color: #54E6D4; font-style: normal; }
    .spinner {
      width: 22px; height: 22px;
      border: 2.5px solid rgba(255,255,255,0.12);
      border-top-color: #54E6D4; border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error ────────────────────────────────────────────── */
    #s-error {
      background: #fbfbfc;
      align-items: center; justify-content: center;
      padding: 32px 24px; text-align: center; gap: 0;
    }
    .err-icon {
      width: 68px; height: 68px; border-radius: 20px;
      background: rgba(233,73,82,0.1);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; margin: 0 auto 20px;
    }
    .err-title {
      font-family: "Space Grotesk", sans-serif;
      font-size: 22px; font-weight: 700; color: #0c0d12; margin-bottom: 10px;
    }
    .err-body {
      font-size: 14px; color: #54565e; line-height: 1.55;
      max-width: 280px; margin: 0 auto 32px;
    }

    /* ── Shared buttons ───────────────────────────────────── */
    .btn-primary {
      width: 100%; padding: 16px; border-radius: 16px;
      background: var(--accent, #54E6D4);
      color: #0c0d12;
      font-size: 15px; font-weight: 600; letter-spacing: -0.005em;
      text-align: center; cursor: pointer;
      box-shadow: 0 8px 20px -8px color-mix(in srgb, var(--accent, #54E6D4) 55%, transparent);
      transition: transform 0.08s ease;
    }
    .btn-primary:active { transform: scale(0.985); }

    .btn-secondary {
      width: 100%; padding: 14px; border-radius: 16px;
      border: 1.5px solid #e3e4e8; background: #fff; color: #0c0d12;
      font-size: 14px; font-weight: 600; text-align: center; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .btn-secondary:active { background: #f5f5f7; }

    .powered-bezl {
      text-align: center;
      color: #9b9ea6; font-size: 10px; letter-spacing: 0.22em;
      font-family: "JetBrains Mono", monospace;
    }
    .powered-bezl strong { color: #0c0d12; font-weight: 700; }

    .icon-circle {
      width: 36px; height: 36px; border-radius: 999px;
      border: 1px solid #ececef; background: #fff; color: #0c0d12;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.15s;
    }

    /* ── Landing (Entry design) ───────────────────────────── */
    #s-landing {
      background: #fbfbfc;
      overflow-y: auto; -webkit-overflow-scrolling: touch;
    }
    .landing-inner {
      min-height: 100%;
      display: flex; flex-direction: column;
      padding: calc(env(safe-area-inset-top, 0px) + 16px) 22px
               calc(env(safe-area-inset-bottom, 0px) + 16px);
    }

    /* Org header */
    .org-header {
      display: flex; align-items: center; justify-content: center;
      gap: 6px; padding: 0 0 6px;
    }
    .org-name {
      font-size: 15px; font-weight: 700; color: #0c0d12; letter-spacing: -0.005em;
    }
    .verified-badge {
      width: 15px; height: 15px; border-radius: 999px;
      background: #1d9bf0; color: #fff;
      display: inline-flex; align-items: center; justify-content: center;
    }

    /* Frame preview card */
    .frame-card {
      width: 100%; aspect-ratio: 4/5; position: relative;
      border-radius: 4px; overflow: hidden;
      box-shadow: 0 18px 40px -16px rgba(12,13,18,0.25), 0 2px 6px rgba(12,13,18,0.08);
      background: #ddd; flex-shrink: 0;
    }
    .frame-card-photo-bg {
      position: absolute; inset: 0;
      background: radial-gradient(120% 90% at 50% 35%, #d6cdb9 0%, #8a8e94 45%, #4b4d56 100%);
    }
    /* silhouette */
    .frame-card-photo-bg::before {
      content: ''; position: absolute; left: 50%; top: 40%;
      transform: translate(-50%, -50%);
      width: 42%; aspect-ratio: 1/1.15; border-radius: 50% 50% 48% 48%;
      background: radial-gradient(60% 60% at 45% 35%,
        rgba(255,235,210,0.55) 0%, rgba(180,140,100,0.35) 60%, transparent 100%);
      filter: blur(1px);
    }
    .frame-card-photo-bg::after {
      content: ''; position: absolute; bottom: -4%; left: 50%;
      transform: translateX(-50%);
      width: 100%; height: 44%; border-radius: 50% 50% 0 0;
      background: radial-gradient(80% 100% at 50% 0%,
        rgba(40,40,50,0.55) 0%, rgba(20,20,30,0.85) 60%, rgba(10,10,15,1) 100%);
    }
    .frame-overlay-img {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: fill; pointer-events: none; z-index: 2;
      opacity: 0; transition: opacity 0.3s;
    }

    /* Campaign info */
    .campaign-info { text-align: center; margin-top: 2px; }
    .campaign-headline {
      font-size: 22px; font-weight: 600; letter-spacing: -0.01em;
      color: #0c0d12; line-height: 1.2;
    }
    .campaign-subhead {
      margin: 6px 14px 0; color: #54565e; font-size: 13px; line-height: 1.45;
    }

    /* Stats row */
    .stats-row {
      display: flex; align-items: center; gap: 10px;
      font-size: 12px; color: #54565e;
      flex-wrap: wrap; justify-content: center;
    }
    .stats-dot { width: 3px; height: 3px; border-radius: 999px; background: #d0d2d8; }
    .stat-val { color: #0c0d12; font-weight: 600; }
    .trending {
      display: inline-flex; align-items: center; gap: 5px;
      color: #5A43FE; font-weight: 600;
    }

    /* Urgency banner */
    .urgency-banner {
      background: #0c0d12; color: #fff; border-radius: 12px;
      padding: 8px 14px;
      display: flex; align-items: center; gap: 10px; width: 100%;
    }
    .urgency-dot { width: 6px; height: 6px; border-radius: 999px; flex-shrink: 0; }
    .urgency-label { font-size: 12px; font-weight: 600; }
    .urgency-timer {
      margin-left: auto; font-size: 10px; font-family: "JetBrains Mono", monospace;
      letter-spacing: 0.08em;
    }

    /* CTA group */
    .cta-group {
      display: flex; flex-direction: column; gap: 8px; margin-top: 12px;
    }

    /* ── Camera ───────────────────────────────────────────── */
    #s-camera { background: #fff; }

    .cam-topbar {
      padding: calc(env(safe-area-inset-top, 0px) + 16px) 22px 6px;
      display: flex; align-items: center; flex-shrink: 0;
    }
    .cam-topbar-icon {
      color: #b0b3bb; display: flex; align-items: center; padding: 2px; flex-shrink: 0;
    }

    /* QuickToggle pills */
    .quick-toggle {
      height: 28px; padding: 0 7px; min-width: 28px;
      display: inline-flex; align-items: center; gap: 4px;
      border-radius: 999px; color: #54565e;
      font-size: 11px; font-weight: 600; font-family: "JetBrains Mono", monospace;
      letter-spacing: 0.02em; transition: all 0.15s; position: relative;
    }
    .quick-toggle.active {
      background: #0c0d12; color: #fff; padding: 0 9px 0 7px;
    }
    .quick-toggle-dot {
      position: absolute; top: 4px; right: 5px;
      width: 5px; height: 5px; border-radius: 999px;
    }

    /* Viewfinder */
    .cam-viewfinder-wrap {
      display: flex; align-items: flex-start; justify-content: center;
      padding: 0 22px; background: #fff; flex-shrink: 0;
    }
    #viewfinder {
      width: 100%; aspect-ratio: 4/5;
      position: relative; background: #0c0d12;
      overflow: hidden; border-radius: 4px;
      box-shadow: 0 18px 40px -16px rgba(12,13,18,0.25), 0 2px 6px rgba(12,13,18,0.08);
    }
    #cam-video {
      position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
    }
    #cam-frame-overlay {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: fill; pointer-events: none; z-index: 5;
    }
    #shutter-flash {
      position: absolute; inset: 0; background: #fff;
      opacity: 0; pointer-events: none; z-index: 20; transition: opacity 0.06s;
    }
    #shutter-flash.on { opacity: 0.95; }

    /* Filter row */
    .filter-row {
      padding: 10px 0 6px; border-top: 1px solid #eef0f3; flex-shrink: 0;
    }
    .filter-scroll {
      display: flex; gap: 8px; padding: 0 12px;
      overflow-x: auto; justify-content: center; flex-wrap: nowrap;
    }
    .filter-scroll::-webkit-scrollbar { display: none; }
    .filter-btn {
      display: flex; flex-direction: column; align-items: center; gap: 5px;
      background: none; flex-shrink: 0; padding: 0;
    }
    .filter-circle {
      width: 50px; height: 50px; border-radius: 999px;
      background: #f0f1f4; color: #54565e;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; font-weight: 700;
      font-family: "Space Grotesk", sans-serif;
      transition: background 0.18s, color 0.18s, transform 0.15s;
    }
    .filter-btn.active .filter-circle {
      background: #5A43FE; color: #fff;
      transform: scale(1.08);
    }
    .filter-label {
      font-size: 9.5px; color: #9b9ea6; font-weight: 500; letter-spacing: 0.01em;
    }
    .filter-btn.active .filter-label { color: #0c0d12; font-weight: 600; }

    /* Camera controls */
    .cam-controls {
      padding: 8px 0 calc(env(safe-area-inset-bottom, 0px) + 14px);
      display: flex; flex-direction: column; align-items: center; gap: 0;
      flex-shrink: 0;
    }
    .cam-controls-row {
      display: flex; align-items: center; justify-content: center; gap: 14px;
    }
    .cam-side-btn {
      width: 72px; height: 72px; border-radius: 999px;
      background: #f0f1f4; border: none; color: #0c0d12;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.12s;
    }
    .cam-side-btn:active { transform: scale(0.93); }

    /* Shutter */
    .shutter-btn {
      width: 84px; height: 84px; border-radius: 999px;
      background: #0c0d12;
      border: 3.5px solid #54E6D4;
      box-shadow: 0 0 0 3px #0c0d12, 0 6px 24px rgba(0,0,0,0.25);
      display: flex; align-items: center; justify-content: center;
      color: #fff;
      transition: transform 0.12s;
    }
    .shutter-btn:active { transform: scale(0.93); }


    /* ── Preview ──────────────────────────────────────────── */
    #s-preview { background: #fbfbfc; }

    .preview-topbar {
      padding: calc(env(safe-area-inset-top, 0px) + 16px) 22px 6px;
      display: flex; align-items: center; flex-shrink: 0;
    }
    .retake-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: transparent; color: #b0b3bb;
      font-size: 13px; font-weight: 500; padding: 0; flex-shrink: 0;
    }

    /* Photo hero */
    .photo-hero {
      padding: 0 22px 14px; display: flex; justify-content: center; flex-shrink: 0;
    }
    .photo-hero-card {
      width: 100%; aspect-ratio: 4/5; position: relative;
      background: #0c0d12; overflow: hidden; border-radius: 4px;
      box-shadow: 0 18px 40px -16px rgba(12,13,18,0.25), 0 2px 6px rgba(12,13,18,0.08);
    }
    .photo-hero-card img {
      position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
    }

    /* Share section */
    .share-section {
      flex: 1; padding: 0 22px 16px;
      display: flex; flex-direction: column; overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .share-heading {
      margin: 0 0 14px; font-size: 18px; font-weight: 600;
      color: #0c0d12; line-height: 1.3; letter-spacing: -0.01em; text-align: center;
    }
    .share-heading span { color: #9b9ea6; font-weight: 500; }

    /* Share circles */
    .share-circles {
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .share-circle {
      width: 44px; height: 44px; border-radius: 999px;
      background: #fff; border: 1.5px solid #e3e4e8;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: transform 0.12s; flex-shrink: 0;
    }
    .share-circle:active { transform: scale(0.93); }

    /* Supporter count pill */
    .supporter-pill {
      display: flex; justify-content: center; margin-top: 12px;
    }
    .supporter-pill-inner {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 8px 14px; border-radius: 999px;
      background: #f0f1f4; color: #1877F2;
      font-size: 14px; font-weight: 600; white-space: nowrap;
    }

    /* Action chips */
    .action-chips {
      display: flex; justify-content: center; gap: 8px;
      margin-top: 14px; flex-wrap: wrap;
    }
    .action-chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 12px; border-radius: 999px;
      background: #fff; border: 1.5px solid #e3e4e8;
      color: #0c0d12; font-size: 12px; font-weight: 600; cursor: pointer;
      transition: background 0.18s, color 0.18s, border 0.18s, transform 0.12s;
    }
    .action-chip:active { transform: scale(0.97); }
    .action-chip.active { background: #0c0d12; border-color: #0c0d12; color: #fff; }
    .action-chip-icon { color: #54565e; display: inline-flex; transition: color 0.18s; }
    .action-chip.active .action-chip-icon { color: #fff; }
  </style>
</head>
<body>

<!-- ══ LOADING ════════════════════════════════════════════════ -->
<div id="s-loading" class="screen active">
  <div class="bezl-logo">BEZ<em>L</em></div>
  <div class="spinner"></div>
</div>

<!-- ══ ERROR ══════════════════════════════════════════════════ -->
<div id="s-error" class="screen">
  <div class="err-icon" id="err-icon">🔒</div>
  <div class="err-title display" id="err-title">Frame not found</div>
  <p class="err-body" id="err-body">This frame doesn't exist or the link has expired.</p>
  <button class="btn-primary" style="max-width:280px;width:100%"
          onclick="window.open('https://apps.apple.com/us/app/bezl/id6763313319','_blank','noopener')">
    Get BEZL for iOS →
  </button>
</div>

<!-- ══ LANDING (Entry screen design) ═════════════════════════ -->
<div id="s-landing" class="screen">
  <div class="landing-inner">

    <!-- Org header -->
    <div class="org-header">
      <span class="org-name" id="landing-org-name"></span>
      <span class="verified-badge" aria-label="verified">
        <svg width="9" height="9" viewBox="0 0 24 24" fill="none">
          <path d="M5 12.5l4 4 10-10" stroke="#fff" stroke-width="2.8"
                stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
    </div>

    <!-- Frame preview card -->
    <div class="frame-card">
      <div class="frame-card-photo-bg"></div>
      <img id="landing-frame-img" class="frame-overlay-img" src="" alt="">
    </div>

    <!-- Campaign info -->
    <div class="campaign-info" style="flex:1;display:flex;flex-direction:column;gap:12px;align-items:center">
      <div>
        <p id="landing-title" style="font-size:13px;color:#54565e;line-height:1.5;text-align:center;margin:0"></p>
      </div>

      <!-- Stats row (shown only when data available) -->
      <div class="stats-row" id="stats-row" style="display:none">
        <div><span class="stat-val" id="stat-supporters"></span> <span style="color:#9b9ea6">joined</span></div>
        <div class="stats-dot"></div>
        <div><span class="stat-val" id="stat-shares"></span> <span style="color:#9b9ea6">shares</span></div>
        <div class="stats-dot"></div>
        <div class="trending">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2l1.8 5.4 5.4 1.8-5.4 1.8L12 16.4l-1.8-5.4-5.4-1.8 5.4-1.8L12 2z"/>
          </svg>
          Trending
        </div>
      </div>

      <!-- CTAs -->
      <div class="cta-group" style="width:100%;margin-top:auto">
        <button id="btn-use-web" class="btn-primary" style="--accent:#54E6D4">
          Use Instantly
        </button>
        <button id="btn-open-app" class="btn-secondary">Open in BEZL App</button>
        <a href="https://bezlapp.com/" target="_blank" rel="noopener"
           class="powered-bezl" style="margin-top:6px;text-decoration:none">POWERED BY <strong>BEZL</strong></a>
      </div>
    </div>

  </div>
</div>

<!-- ══ CAMERA ════════════════════════════════════════════════ -->
<div id="s-camera" class="screen">

  <!-- Top bar -->
  <div class="cam-topbar">
    <button id="btn-cam-close" class="cam-topbar-icon" aria-label="close">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
    <div style="flex:1;display:flex;align-items:center;justify-content:center;gap:6px">
      <span class="org-name" id="cam-org-name"></span>
      <span class="verified-badge" aria-label="verified">
        <svg width="9" height="9" viewBox="0 0 24 24" fill="none">
          <path d="M5 12.5l4 4 10-10" stroke="#fff" stroke-width="2.8"
                stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
    </div>
    <button id="toggle-timer" class="cam-topbar-icon quick-toggle" aria-label="timer">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="13" r="7.5" stroke="currentColor" stroke-width="1.7"/>
        <path d="M12 9.5V13l2.5 1.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
        <path d="M9 2.5h6M12 2.5v3" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <!-- Viewfinder -->
  <div class="cam-viewfinder-wrap">
    <div id="viewfinder">
      <video id="cam-video" autoplay playsinline muted></video>
      <img id="cam-frame-overlay" src="" alt="">
      <!-- countdown -->
      <div id="cam-countdown" style="display:none;position:absolute;inset:0;
           display:none;align-items:center;justify-content:center;z-index:15;pointer-events:none">
        <div id="cam-countdown-num" class="display"
             style="font-size:120px;font-weight:600;color:#fff;text-shadow:0 4px 24px rgba(0,0,0,0.5)"></div>
      </div>
      <div id="shutter-flash"></div>
    </div>
  </div>

  <!-- Filter swatches -->
  <div class="filter-row">
    <div class="filter-scroll" id="filter-scroll">
      <!-- populated by JS -->
    </div>
  </div>

  <!-- Controls -->
  <div class="cam-controls">
    <div class="cam-controls-row">
      <button id="btn-gallery" class="cam-side-btn" aria-label="gallery">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
          <rect x="3" y="5" width="18" height="14" rx="2.5" stroke="currentColor" stroke-width="1.8"/>
          <circle cx="8.5" cy="10" r="1.4" fill="currentColor"/>
          <path d="M3.5 16.5L9 12l4 3 3-2 4.5 3.5" stroke="currentColor" stroke-width="1.8"
                stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <button id="btn-shutter" class="shutter-btn" aria-label="capture">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none">
          <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"
                stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/>
          <circle cx="12" cy="13" r="4" stroke="currentColor" stroke-width="1.7"/>
        </svg>
      </button>

      <button id="btn-flip" class="cam-side-btn" aria-label="flip camera" style="color:#5A43FE">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
          <path d="M20 7H4a2 2 0 00-2 2v6a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2z"

<script>
'use strict';

/* ── Config ─────────────────────────────────────────────── */
const SUPABASE_URL      = 'https://afalcwqssrhxgvvnnass.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_2GMxETOSQixv8RWqhiiayw_D4WfCOY_';
const APP_STORE_URL     = 'https://apps.apple.com/us/app/bezl/id6763313319';

const FILTERS = [
  { id: 'none',     label: 'None',     css: 'none' },
  { id: 'instant',  label: 'Instant',  css: 'grayscale(100%) contrast(110%)' },
  { id: 'vintage',  label: 'Vintage',  css: 'sepia(70%) brightness(108%) saturate(120%)' },
  { id: 'chrome',   label: 'Chrome',   css: 'saturate(180%) contrast(115%)' },
  { id: 'transfer', label: 'Transfer', css: 'sepia(30%) saturate(150%) hue-rotate(-10deg)' },
  { id: 'process',  label: 'Process',  css: 'saturate(150%) hue-rotate(180deg) contrast(110%)' },
];

/* ── State ──────────────────────────────────────────────── */
let frameData       = null;
let frameImg        = null;
let cameraStream    = null;
let facingMode      = 'user';
let activeFilter    = 'none';
let timerVal        = 0;      // 0 | 3 | 10
let gridOn          = false;
let countdown       = 0;
let countdownTimer  = null;
let compositeDataUrl = null;
let inviteCopied    = false;

/* ── Supabase ───────────────────────────────────────────── */
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* ── Helpers ────────────────────────────────────────────── */
function getFrameId() {
  const m = window.location.pathname.match(/\/f\/([^/?#]+)/);
  return m ? decodeURIComponent(m[1]) : null;
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
  document.getElementById('s-' + id).classList.add('active');
}

function showError(title, body, icon = '🔒') {
  document.getElementById('err-icon').textContent  = icon;
  document.getElementById('err-title').textContent = title;
  document.getElementById('err-body').textContent  = body;
  showScreen('error');
}

/* ── Fetch frame (RPC only) ─────────────────────────────── */
async function fetchFrame(frameId) {
  const { data, error } = await sb.rpc('get_public_web_frame', { frame_id: frameId });
  const frame = Array.isArray(data) ? data[0] : data;

  if (error || !frame) {
    showError('Frame not found', "This frame doesn't exist or has been made private.", '🔍');
    return null;
  }
  if (frame.public_expires_at && new Date(frame.public_expires_at) < new Date()) {
    showError('This frame has expired',
      'The link is no longer active. Download BEZL to discover more frames.', '⏰');
    return null;
  }
  return frame;
}

function loadImage(url) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload  = () => resolve(img);
    img.onerror = () => reject(new Error('Image load failed'));
    img.src = url;
  });
}

/* ── Landing ────────────────────────────────────────────── */
function renderLanding(frame) {
  const title = frame.title || '';
  document.getElementById('landing-org-name').textContent = title;
  document.getElementById('landing-title').innerHTML =
    `Support <strong style="color:#1d9bf0">${title}</strong>. Snap a photo, share the message!`;
  document.getElementById('cam-org-name').textContent     = title;
  document.getElementById('preview-org-name').textContent = title;

  const img = document.getElementById('landing-frame-img');
  img.src = frame.image_url;
  img.onload = () => { img.style.opacity = '1'; };

  document.getElementById('cam-frame-overlay').src = frame.image_url;
  showScreen('landing');
}

/* ── Open in app ────────────────────────────────────────── */
function openInApp(frameId) {
  window.location.href = `bezl://frame/${frameId}`;
  const t = setTimeout(() => window.open(APP_STORE_URL, '_blank', 'noopener'), 2000);
  window.addEventListener('blur', () => clearTimeout(t), { once: true });
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) clearTimeout(t);
  }, { once: true });
}

/* ── Filter swatches ────────────────────────────────────── */
const FILTER_INITIALS = { none:'N', instant:'I', vintage:'V', chrome:'C', transfer:'T', process:'P' };

function buildFilterSwatches() {
  const row = document.getElementById('filter-scroll');
  row.innerHTML = '';
  FILTERS.forEach(f => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (f.id === activeFilter ? ' active' : '');
    btn.dataset.filter = f.id;
    btn.setAttribute('aria-label', f.label);
    btn.innerHTML = `
      <div class="filter-circle">${FILTER_INITIALS[f.id] || f.label[0]}</div>
      <div class="filter-label">${f.label}</div>`;
    btn.addEventListener('click', () => setFilter(f.id));
    row.appendChild(btn);
  });
}

function setFilter(id) {
  activeFilter = id;
  const css = FILTERS.find(f => f.id === id)?.css || 'none';
  document.getElementById('cam-video').style.filter = css;
  buildFilterSwatches();
}

/* ── Camera controls ────────────────────────────────────── */

function updateTimerUI() {
  const btn = document.getElementById('toggle-timer');
  const active = timerVal !== 0;
  btn.classList.toggle('active', active);
  btn.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none">
    <circle cx="12" cy="13" r="7.5" stroke="currentColor" stroke-width="1.7"/>
    <path d="M12 9.5V13l2.5 1.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
    <path d="M9 2.5h6M12 2.5v3" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
  </svg>${active ? `<span>${timerVal}s</span>` : ''}`;
}


/* ── Camera ─────────────────────────────────────────────── */
async function startCamera() {
  try {
    if (cameraStream) { cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; }

    cameraStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode, width: { ideal: 1920 }, height: { ideal: 1440 } },
      audio: false,
    });

    const video = document.getElementById('cam-video');
    video.srcObject = cameraStream;
    video.style.transform = facingMode === 'user' ? 'scaleX(-1)' : 'none';
    video.style.filter = FILTERS.find(f => f.id === activeFilter)?.css || 'none';

    await new Promise(res => video.addEventListener('loadedmetadata', res, { once: true }));
    await video.play();
    return true;
  } catch (err) {
    stopCamera();
    const map = {
      NotAllowedError: ['Camera access denied', 'Allow camera access in browser settings.', '📷'],
      NotFoundError:   ['No camera found', "We couldn't find a camera on this device.", '📷'],
    };
    const [t, b, i] = map[err.name] || ['Camera error', 'Something went wrong. Try again.', '⚠️'];
    showError(t, b, i);
    return false;
  }
}

function stopCamera() {
  if (cameraStream) { cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; }
}

/* ── Capture ────────────────────────────────────────────── */
function doCapture() {
  const video = document.getElementById('cam-video');
  const flash = document.getElementById('shutter-flash');
  flash.classList.add('on');
  setTimeout(() => flash.classList.remove('on'), 150);

  setTimeout(() => {
    const canvas = document.getElementById('compose-canvas');
    const fw = frameImg.naturalWidth, fh = frameImg.naturalHeight;
    canvas.width = fw; canvas.height = fh;
    const ctx = canvas.getContext('2d');

    const vw = video.videoWidth, vh = video.videoHeight;
    const fa = fw / fh, va = vw / vh;
    let sx = 0, sy = 0, sw = vw, sh = vh;
    if (va > fa) { sw = vh * fa; sx = (vw - sw) / 2; }
    else         { sh = vw / fa; sy = (vh - sh) / 2; }

    // Apply filter to canvas
    const filterCss = FILTERS.find(f => f.id === activeFilter)?.css || 'none';
    ctx.filter = filterCss;

    if (facingMode === 'user') {
      ctx.save(); ctx.translate(fw, 0); ctx.scale(-1, 1);
      ctx.drawImage(video, sx, sy, sw, sh, 0, 0, fw, fh);
      ctx.restore();
    } else {
      ctx.drawImage(video, sx, sy, sw, sh, 0, 0, fw, fh);
    }

    ctx.filter = 'none';
    ctx.drawImage(frameImg, 0, 0, fw, fh);

    try {
      compositeDataUrl = canvas.toDataURL('image/jpeg', 0.92);
    } catch (e) {
      showError('Sharing unavailable',
        'Frame image could not be composited — Supabase Storage needs CORS configured for this domain.', '⚠️');
      return;
    }

    stopCamera();
    document.getElementById('preview-img').src = compositeDataUrl;
    showScreen('preview');
  }, 80);
}

function capture() {
  if (timerVal > 0) {
    startCountdown(timerVal);
  } else {
    doCapture();
  }
}

function startCountdown(n) {
  countdown = n;
  const el = document.getElementById('cam-countdown');
  const num = document.getElementById('cam-countdown-num');
  el.style.display = 'flex';

  const tick = () => {
    num.textContent = countdown;
    num.style.animation = 'none';
    void num.offsetWidth;
    num.style.animation = 'bezlPulse 1s ease-out';
    if (countdown <= 0) { el.style.display = 'none'; doCapture(); return; }
    countdown--;
    countdownTimer = setTimeout(tick, 1000);
  };
  tick();
}

/* ── Share ──────────────────────────────────────────────── */
async function nativeShare() {
  try {
    const res  = await fetch(compositeDataUrl);
    const blob = await res.blob();
    const file = new File([blob], 'bezl-frame.jpg', { type: 'image/jpeg' });
    if (navigator.canShare?.({ files: [file] })) {
      await navigator.share({ title: frameData?.title || 'My BEZL Frame',
        text: 'Check this out — made with BEZL!', files: [file] });
      return;
    }
    if (navigator.share) {
      await navigator.share({ title: frameData?.title || 'My BEZL Frame',
        url: window.location.href });
      return;
    }
  } catch (e) { if (e.name === 'AbortError') return; }
  downloadImage();
}

function downloadImage() {
  const a = document.createElement('a');
  a.href = compositeDataUrl;
  a.download = `bezl-${frameData?.id || 'frame'}.jpg`;
  a.click();
}

async function handleInvite() {
  const url = window.location.href;
  const shareData = {
    title: `Join me — ${frameData?.title || 'BEZL Frame'}`,
    text: `I just added my photo. Take yours and join — ${url}`,
    url,
  };
  try {
    if (navigator.share) { await navigator.share(shareData); return; }
  } catch (e) { if (e.name === 'AbortError') return; }
  try { await navigator.clipboard.writeText(url); } catch (_) {}
  const chip = document.getElementById('btn-invite');
  chip.classList.add('active');
  chip.querySelector('.action-chip-icon').innerHTML =
    `<svg width="14" height="14" viewBox="0 0 24 24" fill="none">
      <path d="M5 12.5l4 4 10-10" stroke="currentColor" stroke-width="2.2"
            stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  chip.childNodes[chip.childNodes.length - 1].textContent = ' Link copied';
  setTimeout(() => {
    chip.classList.remove('active');
    chip.querySelector('.action-chip-icon').innerHTML =
      `<svg width="14" height="14" viewBox="0 0 24 24" fill="none">
        <circle cx="9" cy="9" r="3.2" stroke="currentColor" stroke-width="1.8"/>
        <path d="M3 19c0-3 2.7-5 6-5s6 2 6 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <path d="M16 5.5a3 3 0 010 6M18 19c0-2-1-3.5-2.5-4.3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>`;
    chip.childNodes[chip.childNodes.length - 1].textContent = ' Invite friends';
  }, 1800);
}

function platformShare(urlFn) {
  downloadImage();
  setTimeout(() => window.open(urlFn(), '_blank', 'noopener,noreferrer'), 400);
}

/* ── Init ───────────────────────────────────────────────── */
async function init() {
  const frameId = getFrameId();
  if (!frameId) { showError('No frame selected', 'Scan a BEZL QR code to open a frame.', '📷'); return; }

  frameData = await fetchFrame(frameId);
  if (!frameData) return;

  try { frameImg = await loadImage(frameData.image_url); }
  catch { showError('Image failed to load', 'Check your connection and try again.', '🖼️'); return; }

  buildFilterSwatches();
  renderLanding(frameData);
}

/* ── Events ─────────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', () => {

  // Landing
  document.getElementById('btn-use-web').addEventListener('click', async () => {
    showScreen('camera');
    await startCamera();
  });
  document.getElementById('btn-open-app').addEventListener('click', () => openInApp(getFrameId()));

  // Camera top controls
  document.getElementById('toggle-timer').addEventListener('click', () => {
    timerVal = timerVal === 0 ? 3 : timerVal === 3 ? 10 : 0;
    updateTimerUI();
  });
  document.getElementById('btn-cam-close').addEventListener('click', () => {
    clearTimeout(countdownTimer); countdown = 0;
    const cd = document.getElementById('cam-countdown');
    if (cd) cd.style.display = 'none';
    stopCamera(); showScreen('landing');
  });

  // Gallery upload
  document.getElementById('btn-gallery').addEventListener('click', () => {
    document.getElementById('gallery-input').click();
  });
  document.getElementById('gallery-input').addEventListener('change', (e) => {
    const file = e.target.files[0];
    e.target.value = '';
    if (!file) return;

    const img = new Image();
    img.onload = () => {
      const canvas = document.getElementById('compose-canvas');
      const fw = frameImg.naturalWidth, fh = frameImg.naturalHeight;
      canvas.width = fw; canvas.height = fh;
      const ctx = canvas.getContext('2d');

      const fa = fw / fh, iw = img.naturalWidth, ih = img.naturalHeight, ia = iw / ih;
      let sx = 0, sy = 0, sw = iw, sh = ih;
      if (ia > fa) { sw = ih * fa; sx = (iw - sw) / 2; }
      else         { sh = iw / fa; sy = (ih - sh) / 2; }

      const filterCss = FILTERS.find(f => f.id === activeFilter)?.css || 'none';
      ctx.filter = filterCss;
      ctx.drawImage(img, sx, sy, sw, sh, 0, 0, fw, fh);
      ctx.filter = 'none';
      ctx.drawImage(frameImg, 0, 0, fw, fh);
      URL.revokeObjectURL(img.src);

      try {
        compositeDataUrl = canvas.toDataURL('image/jpeg', 0.92);
      } catch (_) {
        showError('Upload failed', 'Could not composite image — check Supabase Storage CORS settings.', '⚠️');
        return;
      }

      stopCamera();
      document.getElementById('preview-img').src = compositeDataUrl;
      showScreen('preview');
    };
    img.src = URL.createObjectURL(file);
  });

  // Shutter + flip
  document.getElementById('btn-shutter').addEventListener('click', capture);
  document.getElementById('btn-flip').addEventListener('click', async () => {
    facingMode = facingMode === 'user' ? 'environment' : 'user';
    await startCamera();
  });

  // Preview
  document.getElementById('btn-retake').addEventListener('click', async () => {
    showScreen('camera'); await startCamera();
  });
  document.getElementById('btn-more').addEventListener('click', nativeShare);
  document.getElementById('btn-fb').addEventListener('click', nativeShare);
  document.getElementById('btn-ig').addEventListener('click', nativeShare);
  document.getElementById('btn-wa').addEventListener('click', nativeShare);
  document.getElementById('btn-sc').addEventListener('click', nativeShare);
  document.getElementById('btn-invite').addEventListener('click', handleInvite);

  updateTimerUI();

  init();
});
</script>
